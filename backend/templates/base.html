<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Campus Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand">🎓 Campus Marketplace</span>
    {% if user.is_authenticated %}
        <span class="text-white">{{ user.full_name }}</span>
        <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Déconnexion</a>
    {% else %}
        <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Connexion</a>
    {% endif %}
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
</body>
</html>
