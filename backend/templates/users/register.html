{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2>Créer un compte</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary w-100">S'inscrire</button>
    </form>
    <p class="mt-3">Déjà un compte ? <a href="{% url 'login' %}">Se connecter</a></p>
  </div>
</div>
{% endblock %}
